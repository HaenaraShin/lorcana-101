<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Disney Lorcana 입문 101 — 강습회</title>
  <link rel="stylesheet" href="demo-board.css">
</head>
<body>

<div class="demo-root">

  <!-- ============== 보드 ============== -->
  <div class="board">

    <!-- 상대(B) 영역 -->
    <section class="player-side opponent active">

      <!-- 상대 우측 컬럼 (화면 좌측, 거울) — Discard 위, Deck 아래 -->
      <div class="lr-column opp-lr">
        <div class="zone-wrap">
          <div class="zone-label">Discard</div>
          <div class="zone discard-zone" id="opp-discard"></div>
        </div>
        <div class="zone-wrap">
          <div class="zone-label">Deck</div>
          <div class="zone deck-zone"><div class="card-back deck-back"></div></div>
        </div>
      </div>

      <!-- Play Area -->
      <div class="play-zone" id="opp-play"></div>

      <!-- 상대 좌측 하단(거울) = 화면 우측 상단 Inkwell -->
      <div class="inkwell-strip opp-inkwell-strip" id="opp-inkwell"></div>
    </section>

    <!-- 중앙 분할선 -->
    <div class="board-divider"><span class="divider-mark">⟡</span></div>

    <!-- 본인(A) 영역 -->
    <section class="player-side self">

      <!-- 본인 좌측 하단 Inkwell -->
      <div class="inkwell-strip self-inkwell-strip" id="self-inkwell"></div>

      <!-- Play Area -->
      <div class="play-zone" id="self-play"></div>

      <!-- 본인 우측 컬럼 — Deck 위, Discard 아래 -->
      <div class="lr-column self-lr">
        <div class="zone-wrap">
          <div class="zone-label">Deck</div>
          <div class="zone deck-zone"><div class="card-back deck-back"></div></div>
        </div>
        <div class="zone-wrap">
          <div class="zone-label">Discard</div>
          <div class="zone discard-zone" id="self-discard"></div>
        </div>
      </div>
    </section>
  </div>

  <!-- ============== 우측 컬럼 (Chapter Rail + Lore + Page Controls) ============== -->
  <aside class="lore-column">
    <!-- 챕터 점프 (세로 리스트, 14개 펼침) -->
    <div class="chapter-rail" id="chapter-rail"></div>

    <div class="lore-block opp-lore-block">
      <div class="lore-diamond"><span class="lore-num" id="opp-lore-num">0</span></div>
    </div>
    <div class="lore-divider-gap"></div>
    <div class="lore-block self-lore-block">
      <div class="lore-diamond"><span class="lore-num" id="self-lore-num">0</span></div>
      <!-- ============== Page Controls (우측 컬럼 하단에 layout flow로) ============== -->
      <div class="page-controls">
        <input type="range" class="page-slider" id="page-slider" min="0" max="0" value="0" disabled>
        <div class="page-info">
          <span id="page-current">1</span> <span class="page-info-sep">/</span> <span id="page-total">1</span>
          <span class="page-info-label" id="page-label"></span>
        </div>
        <div class="page-btn-row">
          <button class="page-btn page-btn-prev" id="btn-prev-page" disabled title="이전 (Backspace · ← · ↑ · PageUp)">← 이전</button>
          <button class="page-btn page-btn-next" id="btn-next-page" title="다음 (Space · → · ↓ · PageDown)">→ 다음</button>
        </div>
        <div class="page-toggles">
          <label><input type="checkbox" id="toggle-subtitle" checked> 자막</label>
          <label><input type="checkbox" id="toggle-dialog" checked> 말풍선</label>
        </div>
        <div class="page-fontsize" title="설명/자막/말풍선 글자 크기">
          <span class="fs-label">글자</span>
          <button class="fs-btn" id="fs-dec" title="작게 (−)">A−</button>
          <span class="fs-display" id="fs-display">16</span>
          <button class="fs-btn" id="fs-inc" title="크게 (+)">A+</button>
        </div>
      </div>
    </div>
  </aside>

</div>

<!-- ============== 본인 손 (부채꼴, 화면 아래 1/3 가려짐) ============== -->
<div class="self-hand-fan" id="self-hand"></div>

<!-- ============== 페이즈 표시 배지 (READY / SET / DRAW) ============== -->
<div class="phase-badge" id="phase-badge"></div>

<!-- ============== 자막 ============== -->
<div class="subtitle-box" id="subtitle-box">
  <div class="subtitle-step"></div>
  <div class="subtitle-text"></div>
</div>

<!-- ============== Scenario Overlay (intro 페이지 위 어두운 layer) ============== -->
<div class="scenario-overlay" id="overlay">
  <div class="overlay-content" id="overlay-content"></div>
</div>

<script src="cards.js"></script>
<script src="demo-board.js"></script>
</body>
</html>
